<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Logboek - Vosserwoude</title>
    <style>
        body { 
            margin: 0; padding: 20px; font-family: 'Georgia', serif; 
            background: #222 url('https://www.transparenttextures.com/patterns/parchment.png');
            color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        /* Timer Style */
        .top-left { position: fixed; top: 15px; left: 15px; z-index: 10001; }
        .timer-pill { 
            min-width: 100px; height: 45px; padding: 0 15px; border-radius: 25px; 
            background: #000; color: #f4e4bc; border: 2px solid #800020; 
            font-weight: bold; font-size: 16px; display: flex; align-items: center; 
            justify-content: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }

        h1 { color: #800020; text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 10px; margin-top: 50px; }
        
        .parchment-container {
            background: #f4e4bc; padding: 20px; border-radius: 5px; border: 2px solid #5d2e0a;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5); width: 100%; max-width: 500px; box-sizing: border-box;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            margin-bottom: 20px;
        }

        .your-stats {
            text-align: center; border-bottom: 2px double #5d2e0a; margin-bottom: 20px; padding-bottom: 15px;
        }

        .your-stats h2 { margin: 5px 0; font-size: 18px; color: #5d2e0a; text-transform: uppercase; }

        /* Styling voor de individuele ontmoetingen */
        .log-entry {
            padding: 8px 0;
            line-height: 1.3;
            text-align: left;
        }

        .log-divider {
            border-bottom: 1px dashed rgba(93, 46, 10, 0.2);
            margin: 2px 0;
        }

        .character-list-own {
            background: rgba(255,255,255,0.3); padding: 15px; 
            border: 1px dashed #5d2e0a; border-radius: 8px; font-size: 16px;
        }

        /* Tabel styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { border-bottom: 1px solid #5d2e0a; padding: 10px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(93, 46, 10, 0.1); font-size: 14px; vertical-align: top !important; }

        .team-col { width: 35%; font-weight: bold; color: #800020; text-transform: capitalize; }
        .status-col { width: 65%; font-style: normal !important; }

        /* De <em> tags uit de sheet (de rollen) */
        .status-col em, .character-list-own em {
            display: block;
            font-size: 0.85em;
            color: #555;
            margin-top: 2px;
            font-style: italic;
        }

        .nav-buttons { margin-top: 10px; width: 100%; max-width: 500px; display: flex; gap: 10px; padding-bottom: 30px; }
        button { 
            flex: 1; padding: 15px; border: 2px solid #555; border-radius: 12px; 
            font-family: 'Georgia', serif; font-weight: bold; text-transform: uppercase;
            background: #000; color: #fff; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .loading { text-align: center; font-style: italic; color: #5d2e0a; margin: 20px 0; }
        h3 { color: #5d2e0a; font-size: 16px; margin-top: 20px; border-bottom: 1px solid #5d2e0a; padding-bottom: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="top-left">
        <div class="timer-pill" id="timer-display">
            <span>⏳</span><span id="countdown">--:--</span>
        </div>
    </div>

    <h1>Het Logboek</h1>

    <div class="parchment-container">
        <div class="your-stats">
            <h2>Uw Team: <span id="displayTeamnaam">...</span></h2>
            <h3>Uw eigen vorderingen:</h3>
            <div id="bezochte-karakters-eigen" class="character-list-own">
                U heeft nog geen enkel spoor gevonden...
            </div>
        </div>

        <h3>Andere onderzoekers in het dorp:</h3>
        <div id="loader" class="loading">Informatie wordt verzameld...</div>
        <table id="leaderboard" style="display:none;">
            <thead>
                <tr>
                    <th class="team-col">Team</th>
                    <th class="status-col">Ondervraagde bewoners:</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>

    <div class="nav-buttons">
        <button onclick="window.location.href='kaart.html'">Terug naar Kaart</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz-5zJfbk34RP5N8hjVu0_ASCLKSDa-hg8Q6ViNFFcwAfKrfZw5iJzfoij8mA9yITwM/exec';
        const teamnaam = localStorage.getItem('teamnaam') || "Onbekend";
        const ONTKNOPING_URL = 'ontknoping.html';
        let timerStarted = false;

        document.getElementById('displayTeamnaam').innerText = teamnaam;

        // Voeg dit toe bovenaan je script in kaart.html en logboek.html
if (teamnaam && localStorage.getItem('spelKlaar_' + teamnaam) === 'true') {
    window.location.href = 'ontknoping.html';
}
        function formatLogEntry(tekst) {
            if (!tekst || tekst.trim() === "" || tekst.includes("Nog geen")) {
                return "Nog geen bewoners gesproken";
            }
            // Splits de karakters op de komma en maak er nette blokjes van
            const karakters = tekst.split(',');
            return karakters
                .map(k => `<div class="log-entry">${k.trim()}</div>`)
                .join('<div class="log-divider"></div>');
        }

        function updateTimer(startIsoString) {
            if (!startIsoString) return;
            const endTime = new Date(startIsoString).getTime() + (120 * 60 * 1000);
            const now = new Date().getTime();
            const distance = endTime - now;
            if (distance <= 0) { window.location.href = ONTKNOPING_URL; return; }
            const hours = Math.floor(distance / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("countdown").innerText = (hours > 0 ? hours + ":" : "") + (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
            if (distance < 600000) document.getElementById("timer-display").style.borderColor = "#ff4444";
        }

        async function loadLogboekData() {
            try {
                // 1. Eigen vorderingen ophalen
                const logRes = await fetch(`${scriptURL}?getLogboek=true&teamnaam=${encodeURIComponent(teamnaam)}`);
                const logData = await logRes.json();
                if (logData.karakters && logData.karakters.trim() !== "") {
                    document.getElementById('bezochte-karakters-eigen').innerHTML = formatLogEntry(logData.karakters);
                }

                // 2. Algemene status (timer/winst)
                const statusRes = await fetch(`${scriptURL}?teamnaam=${encodeURIComponent(teamnaam)}`);
                const statusData = await statusRes.json();
                if (statusData.allesVoltooid === true) { window.location.href = ONTKNOPING_URL; return; }
                if (statusData.starttijd) {
                    updateTimer(statusData.starttijd);
                    if (!timerStarted) { setInterval(() => updateTimer(statusData.starttijd), 1000); timerStarted = true; }
                }

                // 3. Overzicht andere teams ophalen
                const response = await fetch(`${scriptURL}?getLeaderboard=true`);
                const data = await response.json();
                
                const tbody = document.getElementById('leaderboardBody');
                tbody.innerHTML = "";

                data.forEach((entry) => {
                    // We tonen alle teams behalve onszelf (optioneel, haal de if weg om jezelf ook te zien)
                    if (entry.team.toLowerCase() !== teamnaam.toLowerCase()) {
                        const row = tbody.insertRow();
                        const cellTeam = row.insertCell(0);
                        const cellStatus = row.insertCell(1);
                        
                        cellTeam.className = "team-col";
                        cellStatus.className = "status-col";
                        
                        cellTeam.innerText = entry.team;
                        cellStatus.innerHTML = formatLogEntry(entry.karakters);
                    }
                });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('leaderboard').style.display = 'table';

            } catch (e) {
                console.error("Fout:", e);
                document.getElementById('loader').innerText = "Het logboek is momenteel onleesbaar...";
            }
        }

        loadLogboekData();
        setInterval(loadLogboekData, 30000); // Ververs elke 30 seconden
    </script>
</body>
</html>
